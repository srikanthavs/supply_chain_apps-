<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display .expression {
      color: #a0aec0;
      font-size: 14px;
      min-height: 20px;
      word-break: break-all;
    }

    .display .result {
      color: #e2e8f0;
      font-size: 36px;
      font-weight: 300;
      word-break: break-all;
      line-height: 1.2;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      padding: 18px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }

    button:active { transform: scale(0.95); opacity: 0.8; }

    .btn-number {
      background: #1a1a2e;
      color: #e2e8f0;
    }

    .btn-operator {
      background: #533483;
      color: #e2e8f0;
    }

    .btn-equals {
      background: #e94560;
      color: #fff;
    }

    .btn-clear {
      background: #0f3460;
      color: #e2e8f0;
    }

    .btn-zero {
      grid-column: span 2;
    }

    button:hover { filter: brightness(1.2); }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-clear" onclick="toggleSign()">+/-</button>
      <button class="btn-clear" onclick="percent()">%</button>
      <button class="btn-operator" onclick="operator('/')">÷</button>

      <button class="btn-number" onclick="digit('7')">7</button>
      <button class="btn-number" onclick="digit('8')">8</button>
      <button class="btn-number" onclick="digit('9')">9</button>
      <button class="btn-operator" onclick="operator('*')">×</button>

      <button class="btn-number" onclick="digit('4')">4</button>
      <button class="btn-number" onclick="digit('5')">5</button>
      <button class="btn-number" onclick="digit('6')">6</button>
      <button class="btn-operator" onclick="operator('-')">−</button>

      <button class="btn-number" onclick="digit('1')">1</button>
      <button class="btn-number" onclick="digit('2')">2</button>
      <button class="btn-number" onclick="digit('3')">3</button>
      <button class="btn-operator" onclick="operator('+')">+</button>

      <button class="btn-number btn-zero" onclick="digit('0')">0</button>
      <button class="btn-number" onclick="decimal()">.</button>
      <button class="btn-equals" onclick="equals()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let previous = '';
    let op = null;
    let shouldResetScreen = false;

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = current;
    }

    function digit(d) {
      if (shouldResetScreen) {
        current = d;
        shouldResetScreen = false;
      } else {
        current = current === '0' ? d : current + d;
      }
      updateDisplay();
    }

    function decimal() {
      if (shouldResetScreen) { current = '0'; shouldResetScreen = false; }
      if (!current.includes('.')) current += '.';
      updateDisplay();
    }

    function operator(o) {
      if (op && !shouldResetScreen) calculate();
      previous = current;
      op = o;
      shouldResetScreen = true;
      const sym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[o];
      expressionEl.textContent = previous + ' ' + sym;
    }

    function calculate() {
      if (!op || shouldResetScreen) return;
      const a = parseFloat(previous);
      const b = parseFloat(current);
      const sym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[op];
      expressionEl.textContent = previous + ' ' + sym + ' ' + current + ' =';
      let result;
      switch (op) {
        case '+': result = a + b; break;
        case '-': result = a - b; break;
        case '*': result = a * b; break;
        case '/': result = b !== 0 ? a / b : 'Error'; break;
      }
      current = result === 'Error' ? 'Error' : String(parseFloat(result.toFixed(10)));
      op = null;
      shouldResetScreen = true;
      updateDisplay();
    }

    function equals() { calculate(); }

    function clearAll() {
      current = '0';
      previous = '';
      op = null;
      shouldResetScreen = false;
      expressionEl.textContent = '';
      updateDisplay();
    }

    function toggleSign() {
      current = String(parseFloat(current) * -1);
      updateDisplay();
    }

    function percent() {
      current = String(parseFloat(current) / 100);
      updateDisplay();
    }

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') digit(e.key);
      else if (e.key === '.') decimal();
      else if (e.key === '+') operator('+');
      else if (e.key === '-') operator('-');
      else if (e.key === '*') operator('*');
      else if (e.key === '/') { e.preventDefault(); operator('/'); }
      else if (e.key === 'Enter' || e.key === '=') equals();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        current = current.length > 1 ? current.slice(0, -1) : '0';
        updateDisplay();
      }
    });
  </script>
</body>
</html>
